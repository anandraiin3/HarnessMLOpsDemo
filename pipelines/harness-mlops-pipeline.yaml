pipeline:
  name: MLOps Credit Card Approval
  identifier: MLOps_Credit_Card_Approval
  orgIdentifier: default
  projectIdentifier: HarnessMLOPS
  description: "End-to-end MLOps pipeline using AWS native services: SageMaker Experiments for tracking, SageMaker Model Registry for versioning and approval, S3 for artifact storage, EKS for serving. Includes OPA governance gates, automated quality and fairness checks, canary deployment, and Dynatrace continuous verification."
  tags:
    domain: mlops
    app: credit-card-approval
    cloud: aws
  properties:
    ci:
      codebase:
        connectorRef: account.AnandGitHub
        repoName: HarnessMLOpsDemo
        build: <+input>
        sparseCheckout: []
  variables:
    - name: imageTag
      type: String
      value: <+pipeline.sequenceId>
      description: Docker image tag for this pipeline run
    - name: awsRegion
      type: String
      value: us-east-1
      description: AWS region for SageMaker and S3
    - name: s3BucketName
      type: String
      value: <+input>
      description: S3 bucket for model artifacts and metrics
    - name: modelPackageGroup
      type: String
      value: credit-card-approval
      description: SageMaker Model Registry package group name
    - name: apiImageName
      type: String
      value: credit-card-api
      description: Flask prediction API image name
    - name: appImageName
      type: String
      value: credit-card-app
      description: Next.js frontend image name
    - name: s3Region
      type: String
      value: ap-southeast-2
      description: AWS region where the S3 bucket is located (may differ from awsRegion)
    - name: sagemakerExperimentName
      type: String
      value: credit-card-approval
      description: SageMaker Experiments name for tracking training runs
    - name: inferenceImageUri
      type: String
      value: <+input>
      description: "Private ECR image URI for SageMaker Model Registry InferenceSpecification (format: <account>.dkr.ecr.<region>.amazonaws.com/<repo>:<tag>)"
    - name: sagemakerRegion
      type: String
      value: ap-southeast-2
      description: AWS region where SageMaker Model Registry is hosted
    - name: governancePolicySet
      type: String
      value: <+input>
      description: Harness Policy Set identifier containing model_governance.rego (Settings → Governance → Policy Sets)
  stages:
    - stage:
        name: Train Model
        identifier: Train_Model
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: <+input>
              namespace: harness-delegate-ng
              serviceAccountName: helm-delegate-mlops
              automountServiceAccountToken: true
              nodeSelector: {}
              os: Linux
          execution:
            steps:
              - step:
                  type: Run
                  name: Train RF Model
                  identifier: Train_RF_Model
                  spec:
                    connectorRef: account.harnessImage
                    image: python:3.12-slim
                    shell: Sh
                    command: |-
                      pip install --quiet --root-user-action=ignore -r requirements.txt
                      python scripts/train_model.py \
                        --n_estimators 100 \
                        --model_name <+pipeline.variables.modelPackageGroup>
                      export RUN_NAME=$(cat outputs/run_name.txt)
                      echo "RUN_NAME=$RUN_NAME"
                    resources:
                      limits:
                        memory: 2Gi
                        cpu: "1"
                    outputVariables:
                      - name: RUN_NAME
                        type: String
                        value: RUN_NAME
              - step:
                  type: Run
                  name: Log to SageMaker Experiments
                  identifier: Log_to_SageMaker_Experiments
                  spec:
                    connectorRef: account.harnessImage
                    image: python:3.12-slim
                    shell: Sh
                    command: |-
                      pip install --quiet --root-user-action=ignore boto3
                      python scripts/log_experiment.py \
                        --experiment_name <+pipeline.variables.sagemakerExperimentName> \
                        --region <+pipeline.variables.awsRegion>
                    envVariables:
                      AWS_DEFAULT_REGION: <+pipeline.variables.awsRegion>
                    resources:
                      limits:
                        memory: 2Gi
                        cpu: "1"
              - step:
                  type: Run
                  name: Upload Model Artifact to S3
                  identifier: Upload_Model_Artifact_to_S3
                  spec:
                    connectorRef: account.harnessImage
                    image: python:3.12-slim
                    shell: Sh
                    command: |-
                      pip install --quiet --root-user-action=ignore boto3
                      python - <<'EOF'
                      import boto3, os
                      s3 = boto3.client('s3', region_name=os.environ['S3_REGION'])
                      key = f"models/{os.environ['MODEL_GROUP']}/{os.environ['RUN_NAME']}/model.joblib"
                      s3.upload_file('outputs/model.joblib', os.environ['S3_BUCKET'], key)
                      print(f"Uploaded model to s3://{os.environ['S3_BUCKET']}/{key}")
                      EOF
                    envVariables:
                      S3_BUCKET: <+pipeline.variables.s3BucketName>
                      S3_REGION: <+pipeline.variables.s3Region>
                      MODEL_GROUP: <+pipeline.variables.modelPackageGroup>
                      RUN_NAME: <+steps.Train_RF_Model.output.outputVariables.RUN_NAME>
                    resources:
                      limits:
                        memory: 1Gi
                        cpu: "1"
              - step:
                  type: Run
                  name: Upload Model Metrics to S3
                  identifier: Upload_Model_Metrics_to_S3
                  spec:
                    connectorRef: account.harnessImage
                    image: python:3.12-slim
                    shell: Sh
                    command: |-
                      pip install --quiet --root-user-action=ignore boto3
                      python - <<'EOF'
                      import boto3, os
                      s3 = boto3.client('s3', region_name=os.environ['S3_REGION'])
                      key = f"models/{os.environ['MODEL_GROUP']}/{os.environ['RUN_NAME']}/metrics.json"
                      s3.upload_file('outputs/metrics.json', os.environ['S3_BUCKET'], key)
                      print(f"Uploaded metrics to s3://{os.environ['S3_BUCKET']}/{key}")
                      EOF
                    envVariables:
                      S3_BUCKET: <+pipeline.variables.s3BucketName>
                      S3_REGION: <+pipeline.variables.s3Region>
                      MODEL_GROUP: <+pipeline.variables.modelPackageGroup>
                      RUN_NAME: <+steps.Train_RF_Model.output.outputVariables.RUN_NAME>
                    resources:
                      limits:
                        memory: 1Gi
                        cpu: "1"
              - step:
                  type: Run
                  name: Register in SageMaker Model Registry
                  identifier: Register_in_SageMaker_Model_Registry
                  spec:
                    connectorRef: account.harnessImage
                    image: python:3.12-slim
                    shell: Sh
                    command: |-
                      pip install --quiet --root-user-action=ignore boto3
                      S3_PREFIX="s3://<+pipeline.variables.s3BucketName>/models/<+pipeline.variables.modelPackageGroup>/<+steps.Train_RF_Model.output.outputVariables.RUN_NAME>"
                      export S3_MODEL_URI="${S3_PREFIX}/model.joblib"
                      export S3_METRICS_URI="${S3_PREFIX}/metrics.json"
                      python scripts/register_model.py \
                        --s3_model_uri $S3_MODEL_URI \
                        --model_package_group <+pipeline.variables.modelPackageGroup> \
                        --inference_image_uri <+pipeline.variables.inferenceImageUri> \
                        --region <+pipeline.variables.sagemakerRegion>
                      export MODEL_PACKAGE_ARN=$(cat outputs/model_package_arn.txt)
                      echo "MODEL_PACKAGE_ARN=$MODEL_PACKAGE_ARN"
                      echo "S3_METRICS_URI=$S3_METRICS_URI"
                    envVariables:
                      AWS_DEFAULT_REGION: <+pipeline.variables.sagemakerRegion>
                    resources:
                      limits:
                        memory: 1Gi
                        cpu: "1"
                    outputVariables:
                      - name: MODEL_PACKAGE_ARN
                        type: String
                        value: MODEL_PACKAGE_ARN
                      - name: S3_METRICS_URI
                        type: String
                        value: S3_METRICS_URI
        delegateSelectors:
          - helm-delegate-mlops
    - stage:
        name: Fetch Governance Metrics
        identifier: Fetch_Governance_Metrics
        type: CI
        spec:
          cloneCodebase: false
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: <+input>
              namespace: harness-delegate-ng
              serviceAccountName: helm-delegate-mlops
              automountServiceAccountToken: true
              nodeSelector: {}
              os: Linux
          execution:
            steps:
              - step:
                  type: Run
                  name: Fetch Model Metrics
                  identifier: Fetch_Model_Metrics
                  spec:
                    connectorRef: account.harnessImage
                    image: python:3.12-slim
                    shell: Sh
                    command: |-
                      pip install --quiet --root-user-action=ignore boto3

                      python - <<'EOF'
                      import boto3, json, os

                      s3_uri = os.environ['S3_METRICS_URI']
                      bucket, key = s3_uri.replace('s3://', '').split('/', 1)
                      region = os.environ['AWS_DEFAULT_REGION']

                      data = json.loads(
                          boto3.client('s3', region_name=region)
                              .get_object(Bucket=bucket, Key=key)['Body'].read()
                      )

                      print("Model metrics loaded:")
                      for k, v in data.items():
                          if isinstance(v, float):
                              print(f"  {k}: {v:.4f}")

                      with open('/tmp/metrics_payload.txt', 'w') as f:
                          f.write(json.dumps(data))
                      EOF

                      export METRICS_JSON=$(cat /tmp/metrics_payload.txt)
                      echo "Payload ready for Harness Policy evaluation."
                    envVariables:
                      AWS_DEFAULT_REGION: <+pipeline.variables.s3Region>
                      S3_METRICS_URI: <+stages.Train_Model.spec.execution.steps.Register_in_SageMaker_Model_Registry.output.outputVariables.S3_METRICS_URI>
                    resources:
                      limits:
                        memory: 1Gi
                        cpu: "1"
                    outputVariables:
                      - name: METRICS_JSON
                        value: METRICS_JSON
                        type: String
        delegateSelectors:
          - helm-delegate-mlops
        description: ""
    - stage:
        name: Enforce Governance Policy
        identifier: Enforce_Governance_Policy
        type: Custom
        spec:
          execution:
            steps:
              - step:
                  type: Policy
                  name: Enforce Model Governance Policy
                  identifier: Enforce_Model_Governance_Policy
                  spec:
                    policySets:
                      - policy_set_pipeline_approval_05_05_15_35
                    type: Custom
                    policySpec:
                      payload: <+stages.Fetch_Governance_Metrics.spec.execution.steps.Fetch_Model_Metrics.output.outputVariables.METRICS_JSON>
                  timeout: 10m
          environment:
            environmentRef: production
            deployToAll: false
            infrastructureDefinitions:
              - identifier: prodns
    - stage:
        name: Evaluate Model
        identifier: Evaluate_Model
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: <+input>
              namespace: harness-delegate-ng
              serviceAccountName: helm-delegate-mlops
              automountServiceAccountToken: true
              nodeSelector: {}
              os: Linux
          execution:
            steps:
              - step:
                  type: Run
                  name: Quality and Fairness Gate
                  identifier: Quality_and_Fairness_Gate
                  spec:
                    connectorRef: account.harnessImage
                    image: python:3.12-slim
                    shell: Sh
                    command: |-
                      pip install --quiet --root-user-action=ignore boto3
                      python scripts/evaluate_model.py \
                        --s3_metrics_uri <+stages.Train_Model.spec.execution.steps.Register_in_SageMaker_Model_Registry.output.outputVariables.S3_METRICS_URI> \
                        --region <+pipeline.variables.s3Region>
                    envVariables:
                      AWS_DEFAULT_REGION: <+pipeline.variables.s3Region>
                    resources:
                      limits:
                        memory: 1Gi
                        cpu: "1"
        delegateSelectors:
          - helm-delegate-mlops
    - stage:
        name: Build and Push Images
        identifier: Build_and_Push_Images
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            useFromStage: Train_Model
          execution:
            steps:
              - step:
                  type: BuildAndPushDockerRegistry
                  name: Build Flask API
                  identifier: Build_Flask_API
                  spec:
                    connectorRef: account.harnessImage
                    repo: anandraiin3/credit-card-app
                    tags:
                      - <+pipeline.variables.imageTag>
                      - latest
                    caching: true
                    dockerfile: deployment/api/Dockerfile
                    context: deployment/api
              - step:
                  type: BuildAndPushDockerRegistry
                  name: BuildFrontend
                  identifier: Build_Nextjs_Frontend
                  spec:
                    connectorRef: account.harnessImage
                    repo: anandraiin3/credit-card-app
                    tags:
                      - <+pipeline.variables.imageTag>
                      - latest
                    caching: true
                    dockerfile: deployment/app/harness_bank_app/Dockerfile
                    context: deployment/app/harness_bank_app
                    buildArgs:
                      NEXT_PUBLIC_API_URL: http://credit-card-api-staging:5000
        delegateSelectors:
          - helm-delegate-mlops
    - stage:
        name: Deploy Staging
        identifier: Deploy_Staging
        type: Deployment
        spec:
          deploymentType: Kubernetes
          environment:
            environmentRef: staging
            deployToAll: false
            infrastructureDefinitions:
              - identifier: staging
          execution:
            steps:
              - step:
                  type: K8sRollingDeploy
                  name: Rolling Deploy to Staging
                  identifier: Rolling_Deploy_Staging
                  spec:
                    skipDryRun: false
                    pruningEnabled: false
                  timeout: 10m
            rollbackSteps:
              - step:
                  type: K8sRollingRollback
                  name: Rollback Staging
                  identifier: Rollback_Staging
                  spec:
                    pruningEnabled: false
                  timeout: 10m
          services:
            values:
              - serviceRef: CreditCardApp
                serviceInputs:
                  serviceDefinition:
                    type: Kubernetes
                    spec:
                      artifacts:
                        primary:
                          primaryArtifactRef: <+input>
                          sources: <+input>
              - serviceRef: CreditCardApi
                serviceInputs:
                  serviceDefinition:
                    type: Kubernetes
                    spec:
                      artifacts:
                        primary:
                          primaryArtifactRef: <+input>
                          sources: <+input>
            metadata:
              parallel: false
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback
        tags: {}
        delegateSelectors:
          - helm-delegate-mlops
    - stage:
        name: Integration Tests
        identifier: Integration_Tests
        type: CI
        spec:
          cloneCodebase: false
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: <+input>
              namespace: mlops
              os: Linux
          execution:
            steps:
              - step:
                  type: Run
                  name: Health Check
                  identifier: Health_Check
                  spec:
                    connectorRef: account.Dockerhub
                    image: curlimages/curl:latest
                    shell: Sh
                    command: |-
                      curl -f http://credit-card-api-staging:5000/health
                      echo "Health check passed"
              - step:
                  type: Run
                  name: Prediction Smoke Tests
                  identifier: Prediction_Smoke_Tests
                  spec:
                    connectorRef: account.Dockerhub
                    image: python:3.12-slim
                    shell: Sh
                    command: |-
                      pip install --quiet requests

                      python - <<'EOF'
                      import requests, sys

                      BASE = "http://credit-card-api-staging:5000"

                      # High-income, owns car and house → expect Approved (1)
                      r = requests.post(f"{BASE}/predict", json={
                          "income": 150000, "children": 0, "ownCar": True, "ownHouse": True
                      })
                      assert r.status_code == 200, f"Unexpected status: {r.status_code}"
                      result = r.json()
                      assert result["prediction"] == 1, \
                          f"Expected Approved for high-income applicant, got: {result}"
                      print(f"[PASS] High-income applicant: {result['result_str']}")

                      # Low-income, no assets → expect Rejected (0)
                      r = requests.post(f"{BASE}/predict", json={
                          "income": 30000, "children": 4, "ownCar": False, "ownHouse": False
                      })
                      assert r.status_code == 200, f"Unexpected status: {r.status_code}"
                      result = r.json()
                      assert result["prediction"] == 0, \
                          f"Expected Rejected for low-income applicant, got: {result}"
                      print(f"[PASS] Low-income applicant: {result['result_str']}")

                      print("\nAll integration tests passed.")
                      EOF
        delegateSelectors:
          - helm-delegate-mlops
    - stage:
        name: Approve Production Deployment
        identifier: Approve_Production_Deployment
        type: Approval
        spec:
          execution:
            steps:
              - step:
                  type: HarnessApproval
                  name: Approve for Production
                  identifier: Approve_for_Production
                  spec:
                    approvalMessage: |-
                      Governance policy checks and staging tests have passed. Review before approving production.

                      SageMaker Experiments run: <+stages.Train_Model.spec.execution.steps.Train_RF_Model.output.outputVariables.RUN_NAME>
                      SageMaker Model Registry ARN: <+stages.Train_Model.spec.execution.steps.Register_in_SageMaker_Model_Registry.output.outputVariables.MODEL_PACKAGE_ARN>
                      S3 metrics: <+stages.Train_Model.spec.execution.steps.Register_in_SageMaker_Model_Registry.output.outputVariables.S3_METRICS_URI>
                      Image tag: <+pipeline.variables.imageTag>

                      Approving will:
                        1. Set model to Approved in SageMaker Model Registry
                        2. Trigger canary rollout to production EKS
                        3. Flask API pods will load the newly approved model on startup
                    includePipelineExecutionHistory: true
                    approvers:
                      minimumCount: 1
                      disallowPipelineExecutor: false
                      userGroups:
                        - account._account_all_users
                  timeout: 24h
    - stage:
        name: Approve Model in Registry
        identifier: Approve_Model_in_Registry
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: <+input>
              namespace: mlops
              os: Linux
          execution:
            steps:
              - step:
                  type: Run
                  name: Approve Model Package
                  identifier: Approve_Model_Package
                  spec:
                    connectorRef: account.Dockerhub
                    image: python:3.12-slim
                    shell: Sh
                    command: |-
                      pip install --quiet --root-user-action=ignore boto3
                      python scripts/promote_model.py \
                        --model_package_arn <+stages.Train_Model.spec.execution.steps.Register_in_SageMaker_Model_Registry.output.outputVariables.MODEL_PACKAGE_ARN> \
                        --region <+pipeline.variables.sagemakerRegion>
                    envVariables:
                      AWS_DEFAULT_REGION: <+pipeline.variables.sagemakerRegion>
                    resources:
                      limits:
                        memory: 1Gi
                        cpu: "1"
    - stage:
        name: Deploy Production
        identifier: Deploy_Production
        type: Deployment
        spec:
          deploymentType: Kubernetes
          service:
            serviceRef: <+input>
            serviceInputs: <+input>
          environment:
            environmentRef: production
            deployToAll: false
            infrastructureDefinitions:
              - identifier: prodns
          execution:
            steps:
              - stepGroup:
                  name: Canary Rollout
                  identifier: Canary_Rollout
                  steps:
                    - step:
                        type: K8sCanaryDeploy
                        name: Deploy Canary 25pct
                        identifier: Deploy_25_Canary
                        spec:
                          skipDryRun: false
                          instanceSelection:
                            type: Percentage
                            spec:
                              percentage: 25
                        timeout: 10m
                    - step:
                        type: Verify
                        name: Verify with Dynatrace
                        identifier: Verify_with_Dynatrace
                        spec:
                          isMultiServicesOrEnvs: false
                          type: Canary
                          monitoredService:
                            type: Default
                            spec: {}
                          spec:
                            sensitivity: MEDIUM
                            duration: 10m
                        timeout: 2h
                        failureStrategies:
                          - onFailure:
                              errors:
                                - Verification
                              action:
                                type: StageRollback
                          - onFailure:
                              errors:
                                - Unknown
                              action:
                                type: StageRollback
                    - step:
                        type: K8sCanaryDelete
                        name: Delete Canary Pods
                        identifier: Delete_Canary_Pods
                        spec: {}
                        timeout: 10m
              - stepGroup:
                  name: Full Rollout
                  identifier: Full_Rollout
                  steps:
                    - step:
                        type: K8sRollingDeploy
                        name: Rolling Deploy to Production
                        identifier: Rolling_Deploy_Production
                        spec:
                          skipDryRun: false
                          pruningEnabled: false
                        timeout: 10m
            rollbackSteps:
              - step:
                  type: K8sCanaryDelete
                  name: Delete Canary on Rollback
                  identifier: Delete_Canary_Rollback
                  spec: {}
                  timeout: 10m
              - step:
                  type: K8sRollingRollback
                  name: Rollback Production
                  identifier: Rollback_Production
                  spec:
                    pruningEnabled: false
                  timeout: 10m
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback
        delegateSelectors:
          - <+input>
