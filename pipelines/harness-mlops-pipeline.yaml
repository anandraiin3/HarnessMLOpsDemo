##############################################################################
# Harness MLOps Pipeline — Credit Card Approval (AWS Native)
#
# AWS Services:
#   SageMaker Experiments  : experiment tracking (params, metrics, fairness)
#   SageMaker Model Registry: model versioning and approval workflow
#   S3                     : model artifact and metrics storage
#   EKS                    : Kubernetes runtime for CI steps and deployments
#
# Pipeline flow:
#   Train Model (train → log → upload → register)
#   → Governance Policy Check (OPA)
#   → Evaluate Model (quality + fairness gate)
#   → Build Images → Deploy Staging → Integration Tests
#   → Approval Gate → Approve in Model Registry → Deploy Production (canary)
#
# IAM: EKS pods need s3:PutObject/GetObject + sagemaker:* via IRSA,
#      or set AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY as Harness secrets.
#
# Import into Harness:
#   Project → Pipelines → Import From Git → select this file
##############################################################################
pipeline:
  name: MLOps Credit Card Approval
  identifier: MLOps_Credit_Card_Approval
  orgIdentifier: default
  projectIdentifier: HarnessMLOPS
  description: >-
    End-to-end MLOps pipeline using AWS native services: SageMaker Experiments
    for tracking, SageMaker Model Registry for versioning and approval,
    S3 for artifact storage, EKS for serving. Includes OPA governance gates,
    automated quality and fairness checks, canary deployment, and Dynatrace
    continuous verification.
  tags:
    domain: mlops
    app: credit-card-approval
    cloud: aws
  properties:
    ci:
      codebase:
        connectorRef: account.AnandGitHub
        repoName: HarnessMLOpsDemo
        build: <+input>
        sparseCheckout: []
  variables:
    - name: imageTag
      type: String
      value: <+pipeline.sequenceId>
      description: Docker image tag for this pipeline run
    - name: awsRegion
      type: String
      value: us-east-1
      description: AWS region for SageMaker and S3
    - name: s3BucketName
      type: String
      value: <+input>
      description: S3 bucket for model artifacts and metrics
    - name: modelPackageGroup
      type: String
      value: credit-card-approval
      description: SageMaker Model Registry package group name
    - name: apiImageName
      type: String
      value: credit-card-api
      description: Flask prediction API image name
    - name: appImageName
      type: String
      value: credit-card-app
      description: Next.js frontend image name
  stages:
    ##########################################################################
    # STAGE 1 — Train Model
    #
    # Each AWS integration is an explicit, named step so Harness orchestrates
    # and visualises every interaction with AWS — nothing is hidden inside
    # a monolithic script.
    #
    # Steps share a workspace volume, so artifacts written in step 1 are
    # read directly by steps 2-5 without any manual file passing.
    #
    # Step 1: Train RF Model                — pure ML, no AWS (scikit-learn)
    # Step 2: Log to SageMaker Experiments  — experiment tracking
    # Step 3: Upload Model Artifact to S3   — Harness S3Upload (OOTB)
    # Step 4: Upload Model Metrics to S3    — Harness S3Upload (OOTB)
    # Step 5: Register in Model Registry    — model versioning (PendingManualApproval)
    ##########################################################################
    - stage:
        name: Train Model
        identifier: Train_Model
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: <+input>
              namespace: mlops
              automountServiceAccountToken: true
              nodeSelector: {}
              os: Linux
          execution:
            steps:

              ##################################################################
              # Step 1 — Train RF Model
              # Pure ML: trains RandomForest, computes metrics and fairness
              # scores, saves model.joblib / metrics.json / params.json locally.
              # No AWS calls — isolates ML logic from infrastructure concerns.
              # Exports RUN_NAME so subsequent steps can reference it in
              # S3 key paths without reading from disk.
              ##################################################################
              - step:
                  type: Run
                  name: Train RF Model
                  identifier: Train_RF_Model
                  spec:
                    connectorRef: account.harnessImage
                    image: python:3.12-slim
                    shell: Sh
                    command: |-
                      pip install --quiet -r requirements.txt
                      python scripts/train_model.py \
                        --n_estimators 100 \
                        --model_name <+pipeline.variables.modelPackageGroup>
                      export RUN_NAME=$(cat outputs/run_name.txt)
                      echo "RUN_NAME=$RUN_NAME"
                    outputVariables:
                      - name: RUN_NAME
                        type: String
                        value: RUN_NAME

              ##################################################################
              # Step 2 — Log to SageMaker Experiments
              # Reads run_name.txt, metrics.json, params.json from shared
              # workspace and logs all parameters and metrics to SageMaker
              # Experiments for experiment comparison and audit trail.
              ##################################################################
              - step:
                  type: Run
                  name: Log to SageMaker Experiments
                  identifier: Log_to_SageMaker_Experiments
                  spec:
                    connectorRef: account.harnessImage
                    image: python:3.12-slim
                    shell: Sh
                    command: |-
                      pip install --quiet boto3 sagemaker
                      python scripts/log_experiment.py \
                        --experiment_name <+pipeline.variables.modelPackageGroup> \
                        --region <+pipeline.variables.awsRegion>
                    envVariables:
                      AWS_DEFAULT_REGION: <+pipeline.variables.awsRegion>

              ##################################################################
              # Step 3 — Upload Model Artifact to S3  [Harness S3Upload]
              # Harness-native S3 upload — no custom script needed.
              # Uses the AWS connector configured in Harness (IAM via connector).
              # Target key: models/<group>/<run_name>/model.joblib
              ##################################################################
              - step:
                  type: S3Upload
                  name: Upload Model Artifact to S3
                  identifier: Upload_Model_Artifact_to_S3
                  spec:
                    connectorRef: <+input>
                    region: <+pipeline.variables.awsRegion>
                    bucket: <+pipeline.variables.s3BucketName>
                    sourcePath: outputs/model.joblib
                    target: models/<+pipeline.variables.modelPackageGroup>/<+steps.Train_RF_Model.output.outputVariables.RUN_NAME>/model.joblib

              ##################################################################
              # Step 4 — Upload Model Metrics to S3  [Harness S3Upload]
              # Harness-native S3 upload for metrics.json.
              # Target key: models/<group>/<run_name>/metrics.json
              # This URI is used by the Governance and Evaluate stages.
              ##################################################################
              - step:
                  type: S3Upload
                  name: Upload Model Metrics to S3
                  identifier: Upload_Model_Metrics_to_S3
                  spec:
                    connectorRef: <+input>
                    region: <+pipeline.variables.awsRegion>
                    bucket: <+pipeline.variables.s3BucketName>
                    sourcePath: outputs/metrics.json
                    target: models/<+pipeline.variables.modelPackageGroup>/<+steps.Train_RF_Model.output.outputVariables.RUN_NAME>/metrics.json

              ##################################################################
              # Step 5 — Register in SageMaker Model Registry
              # Constructs the S3 URIs from pipeline expressions (no file read
              # needed — artifacts are already in S3 from steps 3 & 4).
              # Registers the model as PendingManualApproval and exports the
              # ARN and S3 URIs for downstream stages.
              ##################################################################
              - step:
                  type: Run
                  name: Register in SageMaker Model Registry
                  identifier: Register_in_SageMaker_Model_Registry
                  spec:
                    connectorRef: account.harnessImage
                    image: python:3.12-slim
                    shell: Sh
                    command: |-
                      pip install --quiet boto3
                      S3_PREFIX="s3://<+pipeline.variables.s3BucketName>/models/<+pipeline.variables.modelPackageGroup>/<+steps.Train_RF_Model.output.outputVariables.RUN_NAME>"
                      export S3_MODEL_URI="${S3_PREFIX}/model.joblib"
                      export S3_METRICS_URI="${S3_PREFIX}/metrics.json"
                      python scripts/register_model.py \
                        --s3_model_uri $S3_MODEL_URI \
                        --model_package_group <+pipeline.variables.modelPackageGroup> \
                        --region <+pipeline.variables.awsRegion>
                      export MODEL_PACKAGE_ARN=$(cat outputs/model_package_arn.txt)
                      echo "MODEL_PACKAGE_ARN=$MODEL_PACKAGE_ARN"
                      echo "S3_METRICS_URI=$S3_METRICS_URI"
                    envVariables:
                      AWS_DEFAULT_REGION: <+pipeline.variables.awsRegion>
                      SAGEMAKER_MODEL_PACKAGE_GROUP: <+pipeline.variables.modelPackageGroup>
                    outputVariables:
                      - name: MODEL_PACKAGE_ARN
                        type: String
                        value: MODEL_PACKAGE_ARN
                      - name: S3_METRICS_URI
                        type: String
                        value: S3_METRICS_URI

    ##########################################################################
    # STAGE 2 — Governance Policy Check
    #
    # Demonstrates Harness Governance: policy-as-code enforced automatically
    # at every pipeline run, with a full audit trail in Harness.
    #
    # The OPA policy (policies/model_governance.rego) encodes the compliance
    # and fairness rules defined by the Risk & Compliance team. If any rule
    # fires, the pipeline halts and the model stays PendingManualApproval —
    # it never reaches staging or production.
    #
    # Policy checks:
    #   - test_accuracy  >= 80%   (minimum performance for production)
    #   - test_precision >= 75%   (false approval rate control)
    #   - test_recall    >= 75%   (creditworthy applicant coverage)
    #   - test_f1        >= 75%   (overall model quality)
    #   - fairness_gap   <  20%   (demographic bias threshold)
    ##########################################################################
    - stage:
        name: Governance Policy Check
        identifier: Governance_Policy_Check
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: <+input>
              namespace: mlops
              os: Linux
          execution:
            steps:
              - step:
                  type: Run
                  name: Enforce OPA Governance Policy
                  identifier: Enforce_OPA_Governance_Policy
                  spec:
                    connectorRef: account.harnessImage
                    image: python:3.12-slim
                    shell: Sh
                    command: |-
                      pip install --quiet boto3

                      # Install OPA CLI
                      curl -sSfL \
                        https://openpolicyagent.org/downloads/v0.69.0/opa_linux_amd64_static \
                        -o /usr/local/bin/opa
                      chmod +x /usr/local/bin/opa
                      opa version

                      # Evaluate model metrics against governance policy
                      python scripts/check_governance.py \
                        --s3_metrics_uri $S3_METRICS_URI \
                        --policy_file policies/model_governance.rego \
                        --region <+pipeline.variables.awsRegion>
                    envVariables:
                      AWS_DEFAULT_REGION: <+pipeline.variables.awsRegion>
                      S3_METRICS_URI: <+stages.Train_Model.spec.execution.steps.Register_in_SageMaker_Model_Registry.output.outputVariables.S3_METRICS_URI>

    ##########################################################################
    # STAGE 3 — Evaluate Model
    # Downloads metrics.json from S3 and asserts engineering quality thresholds.
    # Complements the OPA governance gate: while OPA enforces policy-as-code
    # owned by the compliance team, this step is owned by the ML engineering
    # team and can fail independently with richer diagnostic output.
    ##########################################################################
    - stage:
        name: Evaluate Model
        identifier: Evaluate_Model
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: <+input>
              namespace: mlops
              os: Linux
          execution:
            steps:
              - step:
                  type: Run
                  name: Quality and Fairness Gate
                  identifier: Quality_and_Fairness_Gate
                  spec:
                    connectorRef: account.harnessImage
                    image: python:3.12-slim
                    shell: Sh
                    command: |-
                      pip install --quiet boto3
                      python scripts/evaluate_model.py \
                        --s3_metrics_uri <+stages.Train_Model.spec.execution.steps.Register_in_SageMaker_Model_Registry.output.outputVariables.S3_METRICS_URI> \
                        --region <+pipeline.variables.awsRegion>
                    envVariables:
                      AWS_DEFAULT_REGION: <+pipeline.variables.awsRegion>

    ##########################################################################
    # STAGE 4 — Build and Push Images
    # Builds Flask API and Next.js frontend Docker images.
    ##########################################################################
    - stage:
        name: Build and Push Images
        identifier: Build_and_Push_Images
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            useFromStage: Train_Model
          execution:
            steps:
              - step:
                  type: BuildAndPushDockerRegistry
                  name: Build Flask API
                  identifier: Build_Flask_API
                  spec:
                    connectorRef: account.harnessImage
                    repo: anandraiin3/credit-card-app
                    tags:
                      - <+pipeline.variables.imageTag>
                      - latest
                    caching: true
                    dockerfile: deployment/api/Dockerfile
                    context: deployment/api
              - step:
                  type: BuildAndPushDockerRegistry
                  name: BuildFrontend
                  identifier: Build_Nextjs_Frontend
                  spec:
                    connectorRef: account.harnessImage
                    repo: anandraiin3/credit-card-app
                    tags:
                      - <+pipeline.variables.imageTag>
                      - latest
                    caching: true
                    dockerfile: deployment/app/harness_bank_app/Dockerfile
                    context: deployment/app/harness_bank_app
                    buildArgs:
                      NEXT_PUBLIC_API_URL: http://credit-card-api-staging:5000

    ##########################################################################
    # STAGE 5 — Deploy Staging
    # Rolls out API and frontend to the staging EKS namespace.
    ##########################################################################
    - stage:
        name: Deploy Staging
        identifier: Deploy_Staging
        type: Deployment
        spec:
          deploymentType: Kubernetes
          environment:
            environmentRef: staging
            deployToAll: false
            infrastructureDefinitions:
              - identifier: staging
          execution:
            steps:
              - step:
                  type: K8sRollingDeploy
                  name: Rolling Deploy to Staging
                  identifier: Rolling_Deploy_Staging
                  spec:
                    skipDryRun: false
                    pruningEnabled: false
                  timeout: 10m
            rollbackSteps:
              - step:
                  type: K8sRollingRollback
                  name: Rollback Staging
                  identifier: Rollback_Staging
                  spec:
                    pruningEnabled: false
                  timeout: 10m
          services:
            values:
              - serviceRef: CreditCardApp
                serviceInputs:
                  serviceDefinition:
                    type: Kubernetes
                    spec:
                      artifacts:
                        primary:
                          primaryArtifactRef: <+input>
                          sources: <+input>
              - serviceRef: CreditCardApi
                serviceInputs:
                  serviceDefinition:
                    type: Kubernetes
                    spec:
                      artifacts:
                        primary:
                          primaryArtifactRef: <+input>
                          sources: <+input>
            metadata:
              parallel: false
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback
        delegateSelectors:
          - <+input>
        tags: {}

    ##########################################################################
    # STAGE 6 — Integration Tests
    # Smoke-tests the staging API: /health + /predict with known inputs.
    ##########################################################################
    - stage:
        name: Integration Tests
        identifier: Integration_Tests
        type: CI
        spec:
          cloneCodebase: false
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: <+input>
              namespace: mlops
              os: Linux
          execution:
            steps:
              - step:
                  type: Run
                  name: Health Check
                  identifier: Health_Check
                  spec:
                    connectorRef: account.Dockerhub
                    image: curlimages/curl:latest
                    shell: Sh
                    command: |-
                      curl -f http://credit-card-api-staging:5000/health
                      echo "Health check passed"
              - step:
                  type: Run
                  name: Prediction Smoke Tests
                  identifier: Prediction_Smoke_Tests
                  spec:
                    connectorRef: account.Dockerhub
                    image: python:3.12-slim
                    shell: Sh
                    command: |-
                      pip install --quiet requests

                      python - <<'EOF'
                      import requests, sys

                      BASE = "http://credit-card-api-staging:5000"

                      # High-income, owns car and house → expect Approved (1)
                      r = requests.post(f"{BASE}/predict", json={
                          "income": 150000, "children": 0, "ownCar": True, "ownHouse": True
                      })
                      assert r.status_code == 200, f"Unexpected status: {r.status_code}"
                      result = r.json()
                      assert result["prediction"] == 1, \
                          f"Expected Approved for high-income applicant, got: {result}"
                      print(f"[PASS] High-income applicant: {result['result_str']}")

                      # Low-income, no assets → expect Rejected (0)
                      r = requests.post(f"{BASE}/predict", json={
                          "income": 30000, "children": 4, "ownCar": False, "ownHouse": False
                      })
                      assert r.status_code == 200, f"Unexpected status: {r.status_code}"
                      result = r.json()
                      assert result["prediction"] == 0, \
                          f"Expected Rejected for low-income applicant, got: {result}"
                      print(f"[PASS] Low-income applicant: {result['result_str']}")

                      print("\nAll integration tests passed.")
                      EOF

    ##########################################################################
    # STAGE 7 — Approval Gate
    # Human review before production. Reviewer can inspect:
    #   - SageMaker Experiments run metrics and fairness scores
    #   - SageMaker Model Registry package (PendingManualApproval)
    #   - Image tag deployed to staging
    ##########################################################################
    - stage:
        name: Approve Production Deployment
        identifier: Approve_Production_Deployment
        type: Approval
        spec:
          execution:
            steps:
              - step:
                  type: HarnessApproval
                  name: Approve for Production
                  identifier: Approve_for_Production
                  spec:
                    approvalMessage: |-
                      Governance policy checks and staging tests have passed. Review before approving production.

                      SageMaker Experiments run: <+stages.Train_Model.spec.execution.steps.Train_RF_Model.output.outputVariables.RUN_NAME>
                      SageMaker Model Registry ARN: <+stages.Train_Model.spec.execution.steps.Register_in_SageMaker_Model_Registry.output.outputVariables.MODEL_PACKAGE_ARN>
                      S3 metrics: <+stages.Train_Model.spec.execution.steps.Register_in_SageMaker_Model_Registry.output.outputVariables.S3_METRICS_URI>
                      Image tag: <+pipeline.variables.imageTag>

                      Approving will:
                        1. Set model to Approved in SageMaker Model Registry
                        2. Trigger canary rollout to production EKS
                        3. Flask API pods will load the newly approved model on startup
                    includePipelineExecutionHistory: true
                    approvers:
                      minimumCount: 1
                      disallowPipelineExecutor: false
                      userGroups:
                        - account._account_all_users
                  timeout: 24h

    ##########################################################################
    # STAGE 8 — Approve in SageMaker Model Registry
    # Sets ModelApprovalStatus to Approved. The Flask API queries the
    # registry on startup and loads whichever model is Approved.
    ##########################################################################
    - stage:
        name: Approve Model in Registry
        identifier: Approve_Model_in_Registry
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: <+input>
              namespace: mlops
              os: Linux
          execution:
            steps:
              - step:
                  type: Run
                  name: Approve Model Package
                  identifier: Approve_Model_Package
                  spec:
                    connectorRef: account.Dockerhub
                    image: python:3.12-slim
                    shell: Sh
                    command: |-
                      pip install --quiet boto3
                      python scripts/promote_model.py \
                        --model_package_arn <+stages.Train_Model.spec.execution.steps.Register_in_SageMaker_Model_Registry.output.outputVariables.MODEL_PACKAGE_ARN> \
                        --region <+pipeline.variables.awsRegion>
                    envVariables:
                      AWS_DEFAULT_REGION: <+pipeline.variables.awsRegion>

    ##########################################################################
    # STAGE 9 — Deploy Production
    # Canary deploy: 25% traffic → Dynatrace CV verification → 100% rollout.
    # Flask API pods restart and load the newly Approved model from S3
    # via the SageMaker Model Registry lookup.
    ##########################################################################
    - stage:
        name: Deploy Production
        identifier: Deploy_Production
        type: Deployment
        spec:
          deploymentType: Kubernetes
          service:
            serviceRef: <+input>
            serviceInputs: <+input>
          environment:
            environmentRef: production
            deployToAll: false
            infrastructureDefinitions:
              - identifier: prodns
          execution:
            steps:
              - stepGroup:
                  name: Canary Rollout
                  identifier: Canary_Rollout
                  steps:
                    - step:
                        type: K8sCanaryDeploy
                        name: Deploy Canary 25pct
                        identifier: Deploy_25_Canary
                        spec:
                          skipDryRun: false
                          instanceSelection:
                            type: Percentage
                            spec:
                              percentage: 25
                        timeout: 10m
                    - step:
                        type: Verify
                        name: Verify with Dynatrace
                        identifier: Verify_with_Dynatrace
                        spec:
                          isMultiServicesOrEnvs: false
                          type: Canary
                          monitoredService:
                            type: Default
                            spec: {}
                          spec:
                            sensitivity: MEDIUM
                            duration: 10m
                        timeout: 2h
                        failureStrategies:
                          - onFailure:
                              errors:
                                - Verification
                              action:
                                type: StageRollback
                          - onFailure:
                              errors:
                                - Unknown
                              action:
                                type: StageRollback
                    - step:
                        type: K8sCanaryDelete
                        name: Delete Canary Pods
                        identifier: Delete_Canary_Pods
                        spec: {}
                        timeout: 10m
              - stepGroup:
                  name: Full Rollout
                  identifier: Full_Rollout
                  steps:
                    - step:
                        type: K8sRollingDeploy
                        name: Rolling Deploy to Production
                        identifier: Rolling_Deploy_Production
                        spec:
                          skipDryRun: false
                          pruningEnabled: false
                        timeout: 10m
            rollbackSteps:
              - step:
                  type: K8sCanaryDelete
                  name: Delete Canary on Rollback
                  identifier: Delete_Canary_Rollback
                  spec: {}
                  timeout: 10m
              - step:
                  type: K8sRollingRollback
                  name: Rollback Production
                  identifier: Rollback_Production
                  spec:
                    pruningEnabled: false
                  timeout: 10m
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback
        delegateSelectors:
          - <+input>
