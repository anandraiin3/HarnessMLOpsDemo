inputSet:
  name: inputset3
  tags: {}
  identifier: inputset3
  orgIdentifier: default
  projectIdentifier: HarnessMLOPS
  pipeline:
    identifier: MLOps_Credit_Card_Approval
    properties:
      ci:
        codebase:
          build:
            type: branch
            spec:
              branch: main
    variables:
      - name: s3BucketName
        type: String
        value: anand-mlops-demo
      - name: inferenceImageUri
        type: String
        value: 282764120287.dkr.ecr.ap-southeast-2.amazonaws.com/anand/mlops-demo-creditcard:latest
      - name: governancePolicySet
        type: String
        value: policy_set_pipeline_approval_05_05_15_35
    stages:
      - stage:
          identifier: Train_Model
          type: CI
          spec:
            infrastructure:
              type: KubernetesDirect
              spec:
                connectorRef: MlopsK8S
      - stage:
          identifier: Fetch_Governance_Metrics
          type: CI
          spec:
            infrastructure:
              type: KubernetesDirect
              spec:
                connectorRef: MlopsK8S
      - stage:
          identifier: Evaluate_Model
          type: CI
          spec:
            infrastructure:
              type: KubernetesDirect
              spec:
                connectorRef: MlopsK8S
      - stage:
          identifier: Deploy_Staging
          type: Deployment
          spec:
            services:
              values:
                - serviceInputs:
                    serviceDefinition:
                      type: Kubernetes
                      spec:
                        artifacts:
                          primary:
                            primaryArtifactRef: creditcardapp
                            sources: <+input>
                  serviceRef: CreditCardApp
                - serviceInputs:
                    serviceDefinition:
                      type: Kubernetes
                      spec:
                        artifacts:
                          primary:
                            primaryArtifactRef: creditcardapi
                            sources: <+input>
                  serviceRef: CreditCardApi
      - stage:
          identifier: Integration_Tests
          type: CI
          spec:
            infrastructure:
              type: KubernetesDirect
              spec:
                connectorRef: MlopsK8S
      - stage:
          identifier: Approve_Model_in_Registry
          type: CI
          spec:
            infrastructure:
              type: KubernetesDirect
              spec:
                connectorRef: MlopsK8S
      - stage:
          identifier: Deploy_Production
          type: Deployment
          spec:
            service:
              serviceRef: CreditCardApp
              serviceInputs:
                serviceDefinition:
                  type: Kubernetes
                  spec:
                    artifacts:
                      primary:
                        primaryArtifactRef: creditcardapp
                        sources: <+input>
