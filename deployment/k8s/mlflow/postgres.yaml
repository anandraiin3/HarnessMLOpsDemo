##############################################################################
# MLFlow Backend Store — PostgreSQL 15
# Namespace: mlops
#
# IMPORTANT: Replace Secret values with real base64-encoded credentials
#   before deploying to production.
#   echo -n 'yourvalue' | base64
##############################################################################
apiVersion: v1
kind: Secret
metadata:
  name: mlflow-postgres-secret
  namespace: mlops
type: Opaque
data:
  POSTGRES_USER: bWxmbG93         # mlflow       — REPLACE IN PRODUCTION
  POSTGRES_PASSWORD: bWxmbG93cGFzcw==  # mlflowpass — REPLACE IN PRODUCTION
  POSTGRES_DB: bWxmbG93ZGI=      # mlflowdb     — REPLACE IN PRODUCTION

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow-postgres
  namespace: mlops
  labels:
    app: mlflow-postgres
    component: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow-postgres
  template:
    metadata:
      labels:
        app: mlflow-postgres
        component: database
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: mlflow-postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mlflow-postgres-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: mlflow-postgres-secret
                  key: POSTGRES_DB
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "mlflow"]
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "mlflow"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: postgres-data
          emptyDir: {}  # Use a PersistentVolumeClaim for production durability

---
apiVersion: v1
kind: Service
metadata:
  name: mlflow-postgres
  namespace: mlops
  labels:
    app: mlflow-postgres
spec:
  selector:
    app: mlflow-postgres
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
  type: ClusterIP
